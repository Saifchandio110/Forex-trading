<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC ICT Academy | Professional Trading Education</title>
    <style>
        :root {
            --bg-primary: #070b14;
            --bg-secondary: #0d1321;
            --bg-tertiary: #141c2b;
            --bg-card: #1a2332;
            --bg-glass: rgba(26, 35, 50, 0.85);
            --text-primary: #e8edf5;
            --text-secondary: #a0b4cc;
            --text-tertiary: #6b7d95;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-dark: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --gold: #f0b90b;
            --gold-light: #fcd535;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #6366f1;
            --border: #1e2d40;
            --border-light: #2a3a50;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 30px var(--accent-glow);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        .light-theme {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8edf3;
            --bg-card: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --border-light: #d1d5db;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Typography */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        h1 {
            font-size: 2.75rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 2.25rem;
        }
        h3 {
            font-size: 1.75rem;
        }
        h4 {
            font-size: 1.35rem;
        }
        h5 {
            font-size: 1.15rem;
        }
        p {
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Premium Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar.collapsed {
            width: 75px;
        }
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .nav-section-title,
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .progress-text,
        .sidebar.collapsed .sidebar-badge,
        .sidebar.collapsed .user-info {
            display: none;
        }
        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 0.85rem;
        }
        .sidebar-header {
            padding: 1.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(59, 130, 246, 0.03);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .logo-text .accent {
            color: var(--accent);
        }
        .sidebar-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem 0.65rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 1.1rem;
        }
        .sidebar-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Navigation */
        .sidebar-nav {
            flex: 1;
            padding: 1.25rem 1rem;
        }
        .nav-section {
            margin-bottom: 1.75rem;
        }
        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0.5rem 0.85rem;
            margin-bottom: 0.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.8rem 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
            position: relative;
        }
        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(4px);
        }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.1));
            color: var(--accent-light);
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .nav-icon {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar-badge {
            margin-left: auto;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.55rem;
            border-radius: 1rem;
            font-weight: 600;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
        }
        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .user-role {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }
        .progress-bar-container {
            margin-bottom: 1rem;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 20px;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .theme-toggle {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .theme-toggle:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 300px;
            transition: var(--transition);
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .sidebar.collapsed~.main-content {
            margin-left: 75px;
        }

        /* Premium Top Navigation */
        .top-nav {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 90;
            gap: 1rem;
        }
        .search-wrapper {
            position: relative;
            flex: 0 1 450px;
        }
        .search-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 3rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: var(--transition);
            font-weight: 500;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: var(--bg-card);
        }
        .search-input::placeholder {
            color: var(--text-tertiary);
        }
        .search-shortcut {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }
        .top-nav-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .icon-btn {
            position: relative;
            padding: 0.6rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 500;
        }
        .icon-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            padding: 0.15rem 0.45rem;
            border-radius: 1rem;
            font-weight: 700;
            border: 2px solid var(--bg-primary);
        }

        /* Content Area */
        .content-area {
            padding: 2.5rem;
            max-width: 1400px;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            opacity: 0;
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
            border-color: var(--border-light);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .card-accent {
            border-left: 4px solid var(--accent);
        }
        .card-gold {
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, rgba(240, 185, 11, 0.05), transparent);
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
        }
        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }
        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        /* Buttons */
        .btn {
            padding: 0.8rem 1.75rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: var(--transition);
            transform: translateX(-100%);
        }
        .btn:hover::after {
            transform: translateX(100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #d4a30a);
            color: #1a1a1a;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        .btn-lg {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Badges */
        .badge-tag {
            display: inline-block;
            padding: 0.3rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .badge-primary {
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent-light);
        }
        .badge-success {
            background: rgba(16, 185, 129, 0.12);
            color: var(--success);
        }
        .badge-warning {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }
        .badge-gold {
            background: rgba(240, 185, 11, 0.15);
            color: var(--gold);
        }
        .badge-danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        .mt-2 {
            margin-top: 1rem;
        }
        .mt-3 {
            margin-top: 1.5rem;
        }
        .mt-4 {
            margin-top: 2rem;
        }
        .mb-2 {
            margin-bottom: 1rem;
        }
        .mb-3 {
            margin-bottom: 1.5rem;
        }
        .mb-4 {
            margin-bottom: 2rem;
        }
        .text-muted {
            color: var(--text-tertiary);
        }
        .text-accent {
            color: var(--accent-light);
        }
        .text-gold {
            color: var(--gold);
        }
        .text-center {
            text-align: center;
        }

        /* Stats Cards */
        .stat-card {
            text-align: center;
            padding: 1.75rem;
        }
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-light);
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent-light), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-change {
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.3rem;
        }
        .stat-change.up {
            color: var(--success);
        }
        .stat-change.down {
            color: var(--danger);
        }

        /* Course Card */
        .course-card {
            cursor: pointer;
            padding: 1.75rem;
            transition: var(--transition);
        }
        .course-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }
        .course-card .module-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Lecture Card */
        .lecture-card {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            padding: 1.25rem 1.5rem;
            transition: var(--transition);
        }
        .lecture-card:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }
        .lecture-card.completed {
            border-left: 4px solid var(--success);
        }
        .lecture-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 2px solid var(--border);
            transition: var(--transition);
        }
        .lecture-card.completed .lecture-number {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        .lecture-info {
            flex: 1;
        }
        .lecture-info h5 {
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }
        .lecture-info p {
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .lecture-meta {
            display: flex;
            gap: 1.25rem;
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        /* Lecture View */
        .lecture-view {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            align-items: start;
        }
        .lecture-sidebar {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 1.5rem;
            position: sticky;
            top: 100px;
            border: 1px solid var(--border);
        }
        .outline-list {
            margin-top: 1rem;
        }
        .outline-item {
            padding: 0.65rem 0.75rem;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 500;
        }
        .outline-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .outline-item.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.1));
            color: var(--accent-light);
            font-weight: 600;
            border-left: 3px solid var(--accent);
        }
        .outline-item.completed {
            color: var(--success);
        }
        .outline-status {
            font-size: 0.75rem;
            width: 20px;
            text-align: center;
        }

        /* Content Sections */
        .content-section {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .content-section h3 {
            color: var(--accent-light);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }
        .content-list {

    // ==================== APP STATE ====================
    let currentModule = null;
    let currentLecture = null;
    let currentPage = 'dashboard';
    let searchTimeout;

    function getUserData() {
        let data = localStorage.getItem('smc_academy_pro');
        if (!data) {
            data = {
                completedLectures: [],
                notes: {},
                bookmarks: [],
                quizScores: {},
                journalEntries: [],
                theme: 'dark',
                streak: 0,
                lastStudyDate: null,
                totalStudyTime: 0,
                xp: 0,
                level: 1
            };
            saveUserData(data);
        }
        return JSON.parse(data);
    }

    function saveUserData(data) {
        localStorage.setItem('smc_academy_pro', JSON.stringify(data));
    }

    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification notification-${type}`;
        notification.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()">✕</button>`;
        document.body.appendChild(notification);
        setTimeout(() => { if (notification.parentElement) notification.remove(); }, 3500);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function openModal(title, content) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('modal').style.display = 'block';
    }

    // ==================== NAVIGATION ====================
    function navigateTo(page) {
        currentPage = page;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.page === page) item.classList.add('active');
        });

        const content = document.getElementById('contentArea');
        switch (page) {
            case 'dashboard':
                loadDashboard();
                break;
            case 'courses':
                loadCourseOverview();
                break;
            case 'journal':
                loadJournal();
                break;
            case 'calculator':
                loadCalculator();
                break;
            case 'glossary':
                loadGlossary();
                break;
            case 'timer':
                loadSessionTimer();
                break;
            case 'certificate':
                loadCertificate();
                break;
            case 'playbook':
                loadPlaybook();
                break;
            case 'stats':
                loadStats();
                break;
            default:
                loadDashboard();
        }
        updateProgressUI();
        window.scrollTo(0, 0);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function toggleMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');
        sidebar.classList.toggle('mobile-open');
        overlay.style.display = sidebar.classList.contains('mobile-open') ? 'block' : 'none';
    }

    function closeMobileSidebar() {
        document.getElementById('sidebar').classList.remove('mobile-open');
        document.getElementById('mobileOverlay').style.display = 'none';
    }

    function toggleTheme() {
        const body = document.body;
        const data = getUserData();
        if (body.classList.contains('dark-theme')) {
            body.classList.remove('dark-theme');
            body.classList.add('light-theme');
            data.theme = 'light';
        } else {
            body.classList.remove('light-theme');
            body.classList.add('dark-theme');
            data.theme = 'dark';
        }
        saveUserData(data);
    }

    // ==================== PROGRESS ====================
    function calculateProgress() {
        const total = courseData.modules.reduce((sum, m) => sum + m.lectures.length, 0);
        const done = getUserData().completedLectures.length;
        return Math.round((done / total) * 100);
    }

    function updateProgressUI() {
        const pct = calculateProgress();
        document.getElementById('mainProgressBar').style.width = pct + '%';
        document.getElementById('progressPercent').textContent = pct + '%';
        document.getElementById('bookmarkCount').textContent = getUserData().bookmarks.length;
    }

    function updateStudyStreak() {
        const data = getUserData();
        const today = new Date().toDateString();
        if (data.lastStudyDate === today) return;
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (data.lastStudyDate === yesterday) {
            data.streak++;
        } else if (data.lastStudyDate !== today) {
            data.streak = 1;
        }
        data.lastStudyDate = today;
        data.xp += 10;
        if (data.xp >= data.level * 100) {
            data.level++;
            data.xp = 0;
            showNotification(`🎉 Level Up! You're now Level ${data.level}!`, 'success');
        }
        saveUserData(data);
    }

    function completeLecture(moduleId, lectureId) {
        const data = getUserData();
        if (!data.completedLectures.includes(lectureId)) {
            data.completedLectures.push(lectureId);
            data.xp += 25;
            if (data.xp >= data.level * 100) {
                data.level++;
                data.xp -= (data.level - 1) * 100;
                showNotification(`🎉 Level Up! You're now Level ${data.level}!`, 'success');
            }
            saveUserData(data);
            showNotification('✅ Lecture completed! +25 XP', 'success');
            updateProgressUI();
            loadLecture(moduleId, lectureId);
        }
    }

    function getPrevLectureBtn(module, currentId) {
        const idx = module.lectures.findIndex(l => l.id === currentId);
        if (idx > 0) {
            const prev = module.lectures[idx - 1];
            return `<button class="btn btn-outline" onclick="loadLecture(${module.id}, ${prev.id})">← Previous Lecture</button>`;
        }
        return '<div></div>';
    }

    function getNextLectureBtn(module, currentId) {
        const idx = module.lectures.findIndex(l => l.id === currentId);
        if (idx < module.lectures.length - 1) {
            const next = module.lectures[idx + 1];
            return `<button class="btn btn-outline" onclick="loadLecture(${module.id}, ${next.id})">Next Lecture →</button>`;

    // ==================== QUIZ ====================
    let quizState = { currentQ: 0, answers: [], moduleId: null, lectureId: null, showResults: false };

    function startQuiz(moduleId, lectureId) {
        const quiz = quizData[lectureId];
        if (!quiz) {
            showNotification('No quiz available for this lecture yet.', 'info');
            return;
        }
        quizState = { currentQ: 0, answers: new Array(quiz.questions.length).fill(null), moduleId, lectureId,
            showResults: false };
        renderQuiz();
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalTitle').textContent = '📝 Knowledge Check Quiz';
    }

    function renderQuiz() {
        const quiz = quizData[quizState.lectureId];
        if (quizState.showResults) {
            let score = 0;
            quizState.answers.forEach((ans, i) => { if (ans === quiz.questions[i].correct) score++; });
            const pct = Math.round((score / quiz.questions.length) * 100);
            const data = getUserData();
            data.quizScores[quizState.lectureId] = pct;
            saveUserData(data);

            document.getElementById('modalBody').innerHTML = `
            <div class="quiz-results">
              <div class="score-circle">
                <svg width="140" height="140">
                  <circle cx="70" cy="70" r="60" fill="none" stroke="var(--border)" stroke-width="10"/>
                  <circle cx="70" cy="70" r="60" fill="none" stroke="${pct >= 70 ? 'var(--success)' : 'var(--warning)'}" stroke-width="10"
                          stroke-dasharray="${2 * Math.PI * 60}" stroke-dashoffset="${2 * Math.PI * 60 * (1 - pct / 100)}"
                          transform="rotate(-90 70 70)" stroke-linecap="round"/>
                  <text x="70" y="65" text-anchor="middle" fill="var(--text-primary)" font-size="28" font-weight="800">${pct}%</text>
                  <text x="70" y="85" text-anchor="middle" fill="var(--text-secondary)" font-size="12">Score</text>
                </svg>
              </div>
              <h3>${pct >= 80 ? 'Excellent! 🎉' : pct >= 60 ? 'Good Job! 👍' : 'Keep Studying! 📚'}</h3>
              <p>You scored ${score} out of ${quiz.questions.length}</p>
              <button class="btn btn-primary" onclick="closeModal();loadLecture(${quizState.moduleId},${quizState.lectureId})">Back to Lecture</button>
            </div>`;
        } else {
            const q = quiz.questions[quizState.currentQ];
            document.getElementById('modalBody').innerHTML = `
            <div>
              <div class="quiz-progress">
                Question ${quizState.currentQ + 1} of ${quiz.questions.length}
                <div class="progress-bar mt-2"><div class="progress-fill" style="width:${(quizState.currentQ / quiz.questions.length) * 100}%"></div></div>
              </div>
              <h4 class="quiz-question">${q.question}</h4>
              ${q.options.map((opt, i) => `
                <div class="quiz-option ${quizState.answers[quizState.currentQ] === i ? 'selected' : ''}" onclick="selectQuizAnswer(${i})">
                  ${opt}
                </div>
              `).join('')}
              <div class="quiz-actions">
                ${quizState.currentQ > 0 ? `<button class="btn btn-outline" onclick="prevQuizQuestion()">← Previous</button>` : ''}
                <button class="btn btn-primary" onclick="nextQuizQuestion()">
                  ${quizState.currentQ === quiz.questions.length - 1 ? 'Finish Quiz' : 'Next Question →'}
                </button>
              </div>
            </div>`;
        }
    }

    function selectQuizAnswer(index) {
        quizState.answers[quizState.currentQ] = index;
        renderQuiz();
    }

    function nextQuizQuestion() {
        const quiz = quizData[quizState.lectureId];
        if (quizState.answers[quizState.currentQ] === null) {
            showNotification('Please select an answer first', 'warning');
            return;
        }
        if (quizState.currentQ < quiz.questions.length - 1) {
            quizState.currentQ++;
            renderQuiz();
        } else {
            quizState.showResults = true;
            renderQuiz();
        }
    }

    function prevQuizQuestion() {
        if (quizState.currentQ > 0) {
            quizState.currentQ--;
            renderQuiz();
        }
    }

    function calcPosition() {
        const bal = parseFloat(document.getElementById('cBal').value);
        const risk = parseFloat(document.getElementById('cRisk').value);
        const sl = parseFloat(document.getElementById('cSL').value);
        if (bal && risk && sl) {
            const riskAmt = bal * (risk / 100);
            const posSize = (riskAmt / (sl * 10)).toFixed(2);
            document.getElementById('posResult').innerHTML =
                `Position Size: <strong>${posSize} units</strong><br>Risk Amount: <strong>$${riskAmt.toFixed(2)}</strong>`;
        }
    }

    function calcRR() {
        const entry = parseFloat(document.getElementById('rrE').value);
        const sl = parseFloat(document.getElementById('rrS').value);
        const tp = parseFloat(document.getElementById('rrT').value);
        if (entry && sl && tp) {
            const risk = Math.abs(entry - sl);
            const reward = Math.abs(tp - entry);
            const ratio = (reward / risk).toFixed(2);
            document.getElementById('rrResult').innerHTML =
                `R:R Ratio: <strong>1:${ratio}</strong><br>Risk: ${risk.toFixed(5)} | Reward: ${reward.toFixed(5)}`;
        }
    }

    function calcLot() {
        const units = parseFloat(document.getElementById('lotU').value);
        if (units) {
            document.getElementById('lotResult').innerHTML = `
            Standard Lots: <strong>${(units/100000).toFixed(2)}</strong><br>
            Mini Lots: <strong>${(units/10000).toFixed(2)}</strong><br>
            Micro Lots: <strong>${(units/1000).toFixed(2)}</strong>
          `;
        }
    }

        const sessions = [
            { name: 'Sydney', start: 22, end: 7, killZone: false },

            { name: 'New York', start: 13, end: 22, killZone: '8 AM - 11 AM EST' }
        ];
        const el = document.getElementById('sessionTimers');
        if (!el) return;
        el.innerHTML = sessions.map(s => {
            let active = false;
            if (s.start < s.end) active = utcH >= s.start && utcH < s.end;
            else active = utcH >= s.start || utcH < s.end;
            return `<div class="card timer-card">

        }).join('');
    }

          <div class="grid grid-4 mt-3">
            <div class="card stat-card"><div class="stat-icon">📚</div><div class="stat-value">${data.completedLectures.length}</div><div class="stat-label">Lectures Completed</div></div>
            <div class="card stat-card"><div class="stat-icon">📝</div><div class="stat-value">${Object.keys(data.notes).filter(k => data.notes[k]).length}</div><div class="stat-label">Notes Taken</div></div>
            <div class="card stat-card"><div class="stat-icon">📊</div><div class="stat-value">${data.journalEntries.length}</div><div class="stat-label">Trades Logged</div></div>
            <div class="card stat-card"><div class="stat-icon">🔥</div><div class="stat-value">${data.streak}</div><div class="stat-label">Day Streak</div></div>
          </div>
          <div class="card mt-4">
            <h4>Level Progress</h4>
            <p>Level ${data.level} • ${data.xp}/100 XP to Level ${data.level + 1}</p>
            <div class="progress-bar"><div class="progress-fill" style="width:${data.xp}%"></div></div>
          </div>
        </div>
      `;
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
        const data = getUserData();
        if (data.theme === 'light') {
            document.body.classList.remove('dark-theme');
            document.body.classList.add('light-theme');
        }
        loadDashboard();
        updateProgressUI();

        document.getElementById('searchInput').addEventListener('input', function(e) {
            performSearch(e.target.value);
        });

        // Check mobile
        if (window.innerWidth <= 768) {
            document.getElementById('mobileMenuBtn').style.display = 'flex';
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    });

    window.addEventListener('resize', () => {
        if (window.innerWidth <= 768) {
            document.getElementById('mobileMenuBtn').style.display = 'flex';
        } else {
            document.getElementById('mobileMenuBtn').style.display = 'none';
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('mobileOverlay').style.display = 'none';
        }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        if (e.key === 'Escape') closeModal();
    });
</script>
</body>
</html>
